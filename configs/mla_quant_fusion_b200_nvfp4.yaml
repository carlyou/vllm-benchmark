repo: https://github.com/carlyou/vllm.git
model: Beambutbetter/Deepseek-V2-Lite-16B-NVFP4
tp: 1
max_model_len: 2048
num_prompts: 200
input_len: 128
output_len: 128
use_precompiled: true
work_dir: /tmp/vllm-benchmark

# B200: SM 100, NVFP4 quantized DeepSeek-V2-Lite (~9.4 GB).
# Tests MLAAttentionNvfp4QuantPattern fusion.

runs:
  - label: main_baseline
    branch: main

  - label: feature_fuse_off
    branch: feat--mla-static-quant-fusion
    compilation_config:
      pass_config:
        fuse_attn_quant: false

  - label: feature_fuse_on
    branch: feat--mla-static-quant-fusion
    compilation_config:
      pass_config:
        fuse_attn_quant: true
