project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-FP8-Group

build:
  use_precompiled: false
  cuda_arch: "12.1"
  max_jobs: 0.8

server:
  log_level: debug
  clear_caches: true

# DGX Spark: unit tests and e2e tp1 for MLA quant fusion.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: unit_test
        test:
          script: tests/compile/passes/test_mla_attn_quant_fusion.py
          args: "-x -v"

      - label: e2e_tp1
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -k 'DeepSeek'"
