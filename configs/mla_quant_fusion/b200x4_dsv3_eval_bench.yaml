project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  tp: 4
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]

bench:
  num_prompts: 500
  input_len: 128
  output_len: 128
  request_rate: inf

# 4xB200: DSV3 FP8 eval and A/B benchmark — fusion on vs off.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      # Warmup run to prime GPU caches
      - label: warmup
        bench:
          num_prompts: 10

      # Benchmark: fusion OFF (baseline)
      - label: fuse_off
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      # Benchmark: fusion ON
      - label: fuse_on
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true

      # Eval: GSM8K with fusion ON
      - label: gsm8k_fuse_on
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
