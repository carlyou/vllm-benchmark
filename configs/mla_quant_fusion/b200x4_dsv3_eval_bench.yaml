project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  tp: 4
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  log_level: debug
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]

bench:
  num_prompts: 500
  input_len: 128
  output_len: 128
  request_rate: inf

# 4xB200: DSV3 FP8 A/B benchmark (main vs feature) and GSM8K eval.

branches:
  main:
    runs:
      - label: main_warmup
        bench:
          num_prompts: 10
      - label: main_baseline

  feat--mla-quant-fusion-group-fp8:
    runs:
      - label: feat_warmup
        bench:
          num_prompts: 10

      # Benchmark: fusion ON
      - label: feat_fuse_on
        server:
          clear_caches: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true

      # Eval: GSM8K with fusion ON
      - label: gsm8k_fuse_on
        server:
          clear_caches: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
