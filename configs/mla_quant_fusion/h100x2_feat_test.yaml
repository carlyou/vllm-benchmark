project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-FP8-Group

build:
  cuda_arch: "9.0"

server:
  log_level: debug
  clear_caches: true

# 2xH100: unit tests, e2e tp1, and e2e tp2 on feature branch.

branches:
  feat--mla-quant-fusion-group-fp8:
    runs:
      - label: unit_test
        test:
          script: tests/compile/passes/test_mla_attn_quant_fusion.py
          args: "-x -v"

      - label: e2e_tp1
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -k 'DeepSeek'"

      - label: e2e_tp2
        test:
          script: tests/compile/fusions_e2e/test_tp2_ar_rms.py
          args: "-v -k 'DeepSeek'"
