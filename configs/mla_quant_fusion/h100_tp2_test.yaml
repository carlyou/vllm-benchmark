project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  use_precompiled: true
  max_jobs: 0.8
  cuda_arch: "9.0"
  torch_index: https://download.pytorch.org/whl/cu126

server:
  tp: 2

bench:
  num_prompts: 100
  max_concurrency: 8
  num_warmups: 10

# 2xH100: Quick TP=2 smoke test with DeepSeek-V2-Lite FP8.
# Validates multi-GPU pipeline before running on 4xB200.

branches:
  feat--mla-static-quant-fusion:
    runs:
      - label: fuse_off_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true
