project:
  repo: https://github.com/carlyou/vllm.git
  model: nvidia/DeepSeek-V3.2-NVFP4

build:
  use_precompiled: false
  cuda_arch: "12.1"
  max_jobs: 0.8

server:
  log_level: debug
  clear_caches: false

# DGX Spark: DSV3.2 NVFP4 sparse MLA e2e test.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: e2e_r1_nvfp4
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -s -k 'DeepSeek-R1 and TRITON_MLA and inductor and -rms'"
