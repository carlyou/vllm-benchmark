project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

# B200: SM 100, FlashInferMLA/CutlassMLA backends (UNIFORM_BATCH cudagraph support).
# fuse_attn_quant auto-sets FULL, which resolves to FULL_DECODE_ONLY.

runs:
  - label: main_warmup
    branch: main

  - label: feature_fuse_off
    branch: feat--mla-static-quant-fusion
    server:
      compilation_config:
        pass_config:
          fuse_attn_quant: false

  - label: feature_fuse_on
    branch: feat--mla-static-quant-fusion
    server:
      compilation_config:
        pass_config:
          fuse_attn_quant: true

  - label: main_baseline
    branch: main
