project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  use_precompiled: true
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  gpu_memory_utilization: 0.8

eval:
  script: tests/evals/gsm8k/gsm8k_eval.py
  args: "--num-shots 5 --num-questions 100 --max-tokens 256 --temperature 0.0 --seed 42"

# B200: SM 100, FP8 MLA DeepSeek-Coder-V2-Lite.
# Compare fusion on vs off with gsm8k eval.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: fp8_eval
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
