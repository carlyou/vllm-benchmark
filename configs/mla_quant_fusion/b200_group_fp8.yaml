project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-FP8-Group

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  log_level: debug

# 2xB200: tp2 e2e test to compare TRITON_MLA vs FLASHINFER_MLA match counts.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: e2e_tp2
        server:
          tp: 2
        test:
          script: tests/compile/fusions_e2e/test_tp2_ar_rms.py
          args: "-v -k 'DeepSeek'"
