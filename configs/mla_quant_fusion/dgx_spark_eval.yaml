project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-NVFP4

build:
  use_precompiled: false
  cuda_arch: "12.1"
  max_jobs: 0.8

server:
  gpu_memory_utilization: 0.8
  log_level: debug

eval:
  script: tests/evals/gsm8k/gsm8k_eval.py
  args: "--num-shots 5 --num-questions 100 --max-tokens 256 --temperature 0.0 --seed 42"

# DGX Spark: NVFP4 eval smoke test.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: nvfp4_fuse_on
        server:
          compilation_config:
            cudagraph_mode: NONE
            pass_config:
              fuse_attn_quant: true
