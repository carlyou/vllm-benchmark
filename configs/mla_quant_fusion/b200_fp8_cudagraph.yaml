project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  max_jobs: 0.8
  cuda_arch: "10.0"

bench:
  request_rate: 50

# B200: Isolate cudagraph mode effect on fuse_attn_quant.
# fuse_attn_quant forces FULL cudagraph (no piecewise), which may regress
# on B200. This config tests different cudagraph combinations.
#
# Valid combinations:
#   fuse_off: FULL_AND_PIECEWISE, FULL, NONE
#   fuse_on:  FULL, NONE (piecewise incompatible with fusion)

branches:
  feat--mla-static-quant-fusion:
    runs:
      - label: warmup

      - label: fuse_off_cg_piecewise
        server:
          compilation_config:
            cudagraph_mode: FULL_AND_PIECEWISE
            pass_config:
              fuse_attn_quant: false

      - label: fuse_off_cg_full
        server:
          compilation_config:
            cudagraph_mode: FULL
            pass_config:
              fuse_attn_quant: false

      - label: fuse_off_cg_none
        server:
          compilation_config:
            cudagraph_mode: NONE
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_cg_full
        server:
          compilation_config:
            cudagraph_mode: FULL
            pass_config:
              fuse_attn_quant: true

      - label: fuse_on_cg_none
        server:
          compilation_config:
            cudagraph_mode: NONE
            pass_config:
              fuse_attn_quant: true
