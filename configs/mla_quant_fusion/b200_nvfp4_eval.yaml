project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-NVFP4

build:
  max_jobs: 0.8
  cuda_arch: "10.0"

bench:
  max_concurrency: 16
  num_warmups: 50
  iterations: 3

eval:
  script: tests/evals/gsm8k/gsm8k_eval.py
  args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

# B200: SM 100, NVFP4 quantized DeepSeek-V2-Lite.
# Tests MLAAttentionNvfp4QuantPattern fusion.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: fuse_off
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
