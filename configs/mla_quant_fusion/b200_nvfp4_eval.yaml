project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-NVFP4

build:
  use_precompiled: true
  max_jobs: 0.8
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu128

server:
  wait_timeout: 1800

bench:
  num_warmups: 3
  iterations: 3

eval:
  script: tests/evals/gsm8k/gsm8k_eval.py
  args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

# B200: SM 100, NVFP4 quantized DeepSeek-V2-Lite.
# Tests MLAAttentionNvfp4QuantPattern fusion.

branches:
  feat--mla-static-quant-fusion:
    runs:
      - label: fuse_off_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true

      - label: fuse_off_compiled
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_compiled
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
