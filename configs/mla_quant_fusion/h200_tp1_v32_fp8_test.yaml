project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3.2-Exp

build:
  cuda_arch: "9.0"
  torch_index: https://download.pytorch.org/whl/cu128
  install_flashinfer_jit_cache: true

server:
  log_level: debug
  clear_caches: true

# 1xH200: diagnostic for inductor auto_functionalized assert on DSv3.2.
# Uses FP8 variant (not FP4) since NVFP4 kernel requires Blackwell.
# Goal: determine if the assert reproduces without the FP4 path.

branches:
  diag--v32-fp8-main:
    runs:
      - label: diag_main_v32_fp8
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -s -k 'DeepSeek-V3.2 and FLASHMLA_SPARSE and inductor_partition and +quant_fp8 and +rms_norm'"

  test--mla-quant-fusion-group-fp8:
    runs:
      - label: test_feat_v32_fp8
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -s -k 'DeepSeek-V3.2 and FLASHMLA_SPARSE and inductor_partition and +quant_fp8 and +rms_norm'"
