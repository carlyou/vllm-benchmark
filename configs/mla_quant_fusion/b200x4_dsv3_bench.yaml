project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  tp: 4
  max_model_len: 4096
  gpu_memory_utilization: 0.95
  log_level: debug
  wait_timeout: 1800

bench:
  num_prompts: 1000
  input_len: 128
  output_len: 128
  request_rate: inf
  warmup_prompts: 3
  num_warmups: 50

# 4xB200: DSV3 FP8 benchmark — main (fuse off) vs feature (fuse on).
# Both use torch.compile with cudagraph NONE for fair comparison.

branches:
  feat--mla-quant-fusion-group-fp8:
    runs:
      - label: main_warmup
        server:
          compilation_config:
            cudagraph_mode: NONE
            custom_ops: ["+quant_fp8"]
            pass_config:
              fuse_attn_quant: false
        bench:
          num_prompts: 10
          num_warmups: 5

      - label: fuse_off
        server:
          compilation_config:
            cudagraph_mode: NONE
            custom_ops: ["+quant_fp8"]
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on
        server:
          compilation_config:
            cudagraph_mode: NONE
            custom_ops: ["+quant_fp8"]
            pass_config:
              fuse_attn_quant: true
