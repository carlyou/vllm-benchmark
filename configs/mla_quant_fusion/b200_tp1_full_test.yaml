project:
  repo: https://github.com/carlyou/vllm.git
  model: nvidia/DeepSeek-V3.2-NVFP4

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130
  install_flashinfer_jit_cache: true

server:
  log_level: debug

# 1xB200: full e2e tp1 fusion sweep on the test branch.
# Mirrors the CI filter from .buildkite/test_areas/compile.yaml line 139,
# extended to include FLASHMLA_SPARSE rows for DSv3.2 (the new combo
# this PR enables).

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: e2e_tp1_full
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -s -k 'inductor_partition and ((FLASHINFER and not +rms_norm and (not +quant_fp8 or +quant_fp8 and (qwen3 or deepseek)) or llama-3) or (FLASHMLA_SPARSE and DeepSeek-V3.2 and not +rms_norm))'"
