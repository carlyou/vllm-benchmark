project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130
  install_flashinfer_jit_cache: true

server:
  tp: 4
  max_model_len: 4096
  gpu_memory_utilization: 0.95
  log_level: debug
  wait_timeout: 1800
  env:
    VLLM_USE_DEEP_GEMM: "0"
  kernel_config:
    moe_backend: triton
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]

# 4xB200: DSV3 FP8 GSM8K eval — triton MoE backend.
# Previous runs with FLASHINFER_TRTLLM gave 0.015 accuracy.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: gsm8k_baseline
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

      - label: gsm8k_fuse_on
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
