project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  use_precompiled: true
  max_jobs: 0.8
  cuda_arch: "9.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  wait_timeout: 1800

bench:
  max_concurrency: 16
  num_warmups: 50

eval:
  script: tests/evals/gsm8k/gsm8k_eval.py
  args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

# H100: SM 90, eager + compiled benchmarks.
# Fusion on vs off comparison on the feature branch.

branches:
  feat--mla-static-quant-fusion:
    runs:
      - label: fuse_off_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true

      - label: fuse_off_compiled
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_compiled
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
