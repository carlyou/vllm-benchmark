project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3

build:
  cuda_arch: "9.0"

server:
  tp: 8
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  log_level: debug
  wait_timeout: 1800
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]

# 8xH100: DSV3 FP8 GSM8K eval with MLA attn+quant fusion.

branches:
  feat--mla-quant-fusion-group-fp8:
    runs:
      - label: gsm8k_fuse_on
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
