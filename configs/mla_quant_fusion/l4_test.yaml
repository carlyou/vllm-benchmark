project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V2-Lite

build:
  use_precompiled: true
  max_jobs: 0.8
  cuda_arch: "8.9"
  torch_index: https://download.pytorch.org/whl/cu124

# L4: SM 89, compile pass tests only (no server needed).

branches:
  fix/skip-nvfp4-test-sm89:
    build:
      use_precompiled: false
    runs:
      - label: pytest_mla_fusion
        test:
          script: tests/compile/passes/test_mla_attn_quant_fusion.py
          args: "-x -v"
