project:
  repo: https://github.com/carlyou/vllm.git

build:
  use_precompiled: false
  cuda_arch: "9.0"
  max_jobs: 0.8

server:
  log_level: debug

# 2xH100: unit tests + e2e tp1/tp2 tests for MLA quant fusion.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: unit_test
        test:
          script: tests/compile/passes/test_mla_attn_quant_fusion.py
          args: "-x -v"

      - label: e2e_tp1
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-x -v -k 'DeepSeek'"

      - label: e2e_tp2
        server:
          tp: 2
        test:
          script: tests/compile/fusions_e2e/test_tp2_ar_rms.py
          args: "-x -v -k 'DeepSeek'"
