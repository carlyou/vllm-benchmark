project:
  repo: https://github.com/carlyou/vllm.git
  model: nvidia/DeepSeek-V3.2-NVFP4

build:
  use_precompiled: true
  max_jobs: 0.8
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  tp: 4

bench:
  num_prompts: 100
  max_concurrency: 16
  num_warmups: 10

# 4xB200: DeepSeek-V3.2 NVFP4, TP=4.
# Fusion on vs off comparison. Eval only on eager runs.

branches:
  feat--mla-static-quant-fusion:
    runs:
      - label: fuse_off_eager
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--chat --num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_eager
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--chat --num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true

      - label: fuse_off_compiled_igp
        server:
          compilation_config:
            use_inductor_graph_partition: true
            pass_config:
              fuse_attn_quant: false

      - label: fuse_on_compiled_igp
        server:
          compilation_config:
            use_inductor_graph_partition: true
            pass_config:
              fuse_attn_quant: true
