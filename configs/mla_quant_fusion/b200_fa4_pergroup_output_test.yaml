project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-FP8-Group

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130

server:
  log_level: debug
  clear_caches: true

# 1xB200: FA4 fused per-group FP8 output (carlyou/flash-attention pergroup branch).
# Backend unit/GPU-equivalence tests + the MLA attn-quant-fusion pass test (which now
# includes the prefill forward_mha per-group case that exercises the fused output path).
branches:
  test--fa4-pergroup-fp8-output:
    runs:
      - label: prefill_quant_output_test
        test:
          script: tests/v1/attention/test_mla_prefill_quant_output.py
          args: "-v"
      - label: mla_attn_quant_fusion
        test:
          script: tests/compile/passes/test_mla_attn_quant_fusion.py
          args: "-v"
