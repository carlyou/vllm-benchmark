project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  cuda_arch: "12.1"
  max_jobs: 0.8

server:
  gpu_memory_utilization: 0.8

# DGX Spark: GB10 (sm_121), TritonMLA backend only.
# TritonMLA has _cudagraph_support=NEVER, so cudagraph_mode must be NONE
# when fuse_attn_quant is enabled.

branches:
  main:
    runs:
      - label: main_baseline

  feat--mla-static-quant-fusion:
    runs:
      - label: feature_fuse_off
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: feature_fuse_on
        server:
          compilation_config:
            cudagraph_mode: NONE
            pass_config:
              fuse_attn_quant: true
