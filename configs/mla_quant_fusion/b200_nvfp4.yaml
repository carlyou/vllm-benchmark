project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-NVFP4

build:
  max_jobs: 0.8

bench:
  request_rate: 50

# B200: SM 100, NVFP4 quantized DeepSeek-V2-Lite (~9.4 GB).
# Tests MLAAttentionNvfp4QuantPattern fusion.

branches:
  main:
    runs:
      - label: main_warmup
      - label: main_baseline

  feat--mla-static-quant-fusion:
    runs:
      - label: feature_fuse_off
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: false

      - label: feature_fuse_on
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
