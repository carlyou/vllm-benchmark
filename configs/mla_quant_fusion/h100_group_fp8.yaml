project:
  repo: https://github.com/carlyou/vllm.git
  model: carlyou/DeepSeek-V2-Lite-FP8-Group

build:
  cuda_arch: "9.0"

server:
  gpu_memory_utilization: 0.8
  log_level: debug

eval:
  script: tests/evals/gsm8k/gsm8k_eval.py
  args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

# 2xH100: unit tests, e2e tp1/tp2, and full GSM8K eval for group FP8.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: unit_test
        test:
          script: tests/compile/passes/test_mla_attn_quant_fusion.py
          args: "-x -v"

      - label: e2e_tp1
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -k 'DeepSeek and TRITON_MLA'"

      - label: e2e_tp2
        server:
          tp: 2
        test:
          script: tests/compile/fusions_e2e/test_tp2_ar_rms.py
          args: "-x -v -k 'DeepSeek and FLASHINFER_MLA'"

      - label: group_fp8_fuse_on
        server:
          compilation_config:
            custom_ops: ["+quant_fp8"]
            pass_config:
              fuse_attn_quant: true
