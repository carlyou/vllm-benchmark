project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  cuda_arch: "9.0"
  torch_index: https://download.pytorch.org/whl/cu129
  install_flashinfer_jit_cache: true

server:
  tp: 1
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  log_level: debug
  wait_timeout: 1200
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]
    pass_config:
      fuse_attn_quant: true

bench:
  num_prompts: 1000
  input_len: 4096
  output_len: 128
  request_rate: inf
  warmup_prompts: 3
  num_warmups: 50

# Swap-order rerun: feat first, then main. Combined with the original
# (main first, feat second) it should isolate run-order/state drift from
# any real perf delta from the merge-state fusion.

branches:
  feat--mla-merge-state-static-fp8-fusion:
    runs:
      - label: feat_warmup
        bench:
          num_prompts: 20
          num_warmups: 5

      - label: feat_baseline_swap

  main:
    runs:
      - label: main_warmup_swap
        bench:
          num_prompts: 20
          num_warmups: 5

      - label: main_baseline_swap
