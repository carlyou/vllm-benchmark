project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  cuda_arch: "9.0"
  # H100 vast.ai instance ships with R560 driver (CUDA 12.6); cu130 wheels
  # require R580+. cu129 works via CUDA minor-version compatibility.
  torch_index: https://download.pytorch.org/whl/cu129

server:
  tp: 1
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  log_level: debug
  wait_timeout: 1200
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]
    pass_config:
      fuse_attn_quant: true

bench:
  num_prompts: 1000
  input_len: 4096
  output_len: 128
  request_rate: inf
  warmup_prompts: 3
  num_warmups: 50

# 1xH100: A/B benchmark for the MLA merge-state + static-FP8 fusion.
# Both branches use fuse_attn_quant so the only difference is whether
# chunked-prefill rows are quantized via merge_attn_states (feat) or via
# the post-attention bf16 round-trip (main).
# Long input_len (4096) encourages chunked prefill — the only path the
# fusion accelerates — given default max_num_batched_tokens.

branches:
  main:
    runs:
      - label: main_warmup
        bench:
          num_prompts: 20
          num_warmups: 5

      - label: main_baseline

  feat--mla-merge-state-static-fp8-fusion:
    runs:
      - label: feat_fuse_on
