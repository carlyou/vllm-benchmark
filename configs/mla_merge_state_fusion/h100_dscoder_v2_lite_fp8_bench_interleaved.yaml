project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  cuda_arch: "9.0"
  torch_index: https://download.pytorch.org/whl/cu129
  install_flashinfer_jit_cache: true

server:
  tp: 1
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  log_level: debug
  wait_timeout: 1200
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]
    pass_config:
      fuse_attn_quant: true

bench:
  num_prompts: 500
  input_len: 12288
  output_len: 128
  request_rate: inf
  warmup_prompts: 3
  num_warmups: 50

# Interleaved A/B/A/B long-input bench: feat -> main -> feat -> main.
# Two trials per branch, alternating, eliminates the 1st-vs-2nd-position
# thermal bias from a single ordering. Each run hits its own server boot
# (50-prompt vllm-bench warmup is enough to prime caches; no separate
# warmup runs needed). Targets the real feat branch (no instrumentation).

branches:
  feat--mla-merge-state-static-fp8-fusion:
    runs:
      - label: feat_run_1
      - label: main_run_1
        branch: main
      - label: feat_run_2
      - label: main_run_2
        branch: main
  main:
