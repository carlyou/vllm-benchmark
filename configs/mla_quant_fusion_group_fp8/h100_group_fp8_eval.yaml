project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  use_precompiled: true
  max_jobs: 0.8
  cuda_arch: "9.0"
  torch_index: https://download.pytorch.org/whl/cu130

# 4xH100: TP2 e2e test + gsm8k eval with group FP8 fusion.

branches:
  test/mla-group-fp8-fusion:
    runs:
      - label: pytest_tp2_e2e
        test:
          script: tests/compile/fusions_e2e/test_tp2_ar_rms.py
          args: "-x -v -k 'not Scout'"

      - label: gsm8k_fuse_on_eager
        server:
          enforce_eager: true
          compilation_config:
            pass_config:
              fuse_attn_quant: true
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

      - label: gsm8k_fuse_on_compiled
        server:
          compilation_config:
            pass_config:
              fuse_attn_quant: true
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
