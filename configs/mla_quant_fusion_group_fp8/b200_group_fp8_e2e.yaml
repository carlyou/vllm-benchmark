project:
  repo: https://github.com/carlyou/vllm.git
  model: deepseek-ai/DeepSeek-V3

build:
  cuda_arch: "10.0a"

# B200 4xGPU: Run E2E fusion tests for group FP8 MLA attn quant fusion.
# TP1 tests run on single GPU, TP2 tests use 2 GPUs.

branches:
  test--mla-quant-fusion-group-fp8:
    runs:
      - label: tp1_deepseek_v3_fp8
        test:
          script: tests/compile/fusions_e2e/test_tp1_quant.py
          args: "-v -k 'deepseek_v3_fp8 and TRITON_MLA'"

      - label: tp2_deepseek_v3_fp8
        test:
          script: tests/compile/fusions_e2e/test_tp2_ar_rms.py
          args: "-v -k 'deepseek_v3_fp8'"
