project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130
  # Source build is mandatory (FA4 fused-FP8 kernels come from
  # flash-attention#135 via the CMake FetchContent pin). See the eval config.
  use_precompiled: false
  install_flashinfer_jit_cache: true

server:
  tp: 1
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  log_level: debug
  wait_timeout: 1800
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]
    pass_config:
      fuse_attn_quant: true

bench:
  # Reviewer-suggested isolation (PR #43050): concurrency 1 + short output so the
  # measurement is dominated by single-request prefill / TTFT, where the FA4
  # fused-FP8 output path removes the redundant static-FP8 post-quant kernel.
  # Large-batch serving throughput buries this under run-to-run variance.
  num_prompts: 100
  input_len: 4096
  output_len: 8
  request_rate: inf
  max_concurrency: 1
  warmup_prompts: 3
  num_warmups: 10

# 1xB200: batch-size-1 / concurrency-1 TTFT A/B for FA4 native fused FP8 output.
# Run order is MAIN-then-feat here (swapped from the original feat-then-main) to
# check whether the small "feat slower" delta seen earlier is real or just
# run-order / warmup drift: if main is now the slower one, the delta tracks
# order, not the branch.

branches:
  main:
    build:
      use_precompiled: true
    runs:
      - label: main_warmup
        bench:
          num_prompts: 10
          num_warmups: 5
      - label: main_baseline

  test--mla-fa4-native-fp8-output:
    runs:
      - label: feat_warmup
        bench:
          num_prompts: 10
          num_warmups: 5
      - label: feat_baseline
