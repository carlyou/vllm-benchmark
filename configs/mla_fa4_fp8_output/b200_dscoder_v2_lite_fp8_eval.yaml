project:
  repo: https://github.com/carlyou/vllm.git
  model: RedHatAI/DeepSeek-Coder-V2-Lite-Instruct-FP8

build:
  # B200 = SM100 (Blackwell). FA4 is the priority-0 MLA prefill backend here
  # (selector.py), so DSv2-Lite prefill runs on FlashAttn FA4 by default.
  cuda_arch: "10.0"
  torch_index: https://download.pytorch.org/whl/cu130
  # Source build is mandatory: the FA4 fused-FP8 output kernels come from
  # flash-attention#135, pulled via the CMake FetchContent pin in
  # cmake/external_projects/vllm_flash_attn.cmake. A precompiled wheel would
  # NOT rebuild FA4, so the feature would silently no-op.
  use_precompiled: false
  # DSv2-Lite is an FP8 MoE model; pre-seed the FlashInfer JIT cache to avoid
  # several minutes of cutlass kernel JIT on first server start.
  install_flashinfer_jit_cache: true

server:
  tp: 1
  max_model_len: 4096
  gpu_memory_utilization: 0.85
  log_level: debug
  wait_timeout: 1800
  compilation_config:
    cudagraph_mode: NONE
    custom_ops: ["+quant_fp8"]
    pass_config:
      fuse_attn_quant: true

# 1xB200: GSM8K parity check for FA4 native fused FP8 output (MLA prefill).
# Both branches enable fuse_attn_quant, so the ONLY difference is the prefill
# write path:
#   - main: bf16 attention -> separate static-FP8 post-quant kernel
#   - feat: FA4 writes FP8 directly via output_scale (flash-attention#135),
#           gated by supports_quant_output (FA4 + SM100/110 + kFp8StaticTensorSym)
# Accuracy must match within noise; the fused path only removes a redundant
# quant kernel, it does not change numerics meaningfully.

branches:
  main:
    build:
      use_precompiled: true
    runs:
      - label: main_gsm8k
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"

  test--mla-fa4-native-fp8-output:
    runs:
      - label: feat_gsm8k
        eval:
          script: tests/evals/gsm8k/gsm8k_eval.py
          args: "--num-shots 5 --num-questions 1319 --max-tokens 256 --temperature 0.0 --seed 42"
